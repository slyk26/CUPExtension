name: Sanity Check

# Runs automatically on every change to catch obvious breakage early.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate manifest.json
        run: |
          node -e "const m=require('./manifest.json'); if(m.manifest_version!==3){throw new Error('manifest_version must be 3');} if(!m.version){throw new Error('missing version');} console.log('manifest.json OK, version '+m.version);"

      - name: Syntax-check JavaScript bundles
        run: |
          node --check bg.js
          node --check master.b.js
          echo "JS syntax OK"

      - name: Verify referenced assets exist
        run: |
          set -e
          for f in bg.js master.html master.b.js help.html pdftops.html pdftops.js pdftops.js.mem \
                   icons/icon16.png icons/icon48.png icons/icon128.png; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done
          echo "All required files present"
