name: Build Chrome Extension

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read extension metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=IPP-Printing-v$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Validate manifest.json
        run: node -e "require('./manifest.json'); console.log('manifest.json is valid JSON')"

      - name: Package extension (.zip)
        run: |
          set -e
          zip -r -X "${{ steps.meta.outputs.zip_name }}" . \
            -x '.git/*' \
            -x '.github/*' \
            -x '.gitignore' \
            -x '*.zip' \
            -x '.junie/*' \
            -x '.idea/*' \
            -x 'README*'
          echo "Created ${{ steps.meta.outputs.zip_name }}"
          unzip -l "${{ steps.meta.outputs.zip_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: ${{ steps.meta.outputs.zip_name }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.zip_name }}
