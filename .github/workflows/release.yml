name: Release Extension (CRX)

# Manual-only workflow: packs the extension into a signed .crx and publishes
# a GitHub Release with the .crx attached as an asset.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (defaults to v<manifest version>)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read extension metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="v$VERSION"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "crx_name=IPP-Printing-$TAG.crx" >> "$GITHUB_OUTPUT"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Stage extension files
        run: |
          set -e
          mkdir -p build/extension
          # Export only tracked files (excludes untracked/ignored artifacts),
          # then drop repo-only files that must not ship inside the extension.
          git archive HEAD | tar -x -C build/extension
          rm -rf build/extension/.github build/extension/.gitignore \
                 build/extension/.junie build/extension/.idea \
                 build/extension/README* || true
          echo "Staged files:"
          ls -la build/extension

      - name: Restore signing key
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          set -e
          if [ -z "$CRX_PRIVATE_KEY" ]; then
            echo "No CRX_PRIVATE_KEY secret set - generating a throwaway key (extension ID will change per release)."
            openssl genrsa 2048 > build/key.pem
          else
            printf '%s' "$CRX_PRIVATE_KEY" > build/key.pem
          fi

      - name: Pack .crx
        run: |
          set -e
          "${{ steps.setup-chrome.outputs.chrome-path }}" \
            --no-sandbox \
            --pack-extension="$PWD/build/extension" \
            --pack-extension-key="$PWD/build/key.pem"
          mv build/extension.crx "${{ steps.meta.outputs.crx_name }}"
          echo "Created ${{ steps.meta.outputs.crx_name }}"
          ls -la "${{ steps.meta.outputs.crx_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-crx
          path: ${{ steps.meta.outputs.crx_name }}
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.crx_name }}
